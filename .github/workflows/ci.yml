# Minimal CI for Atlas TX.
#
# Why this exists: open-PR triage (May 2026) shipped a production-down fix with
# zero automated gating — nothing verified the build or tests before it deployed
# to Railway. This workflow restores visibility.
#
# CURRENT MODE: informational. Every step runs but NONE block merge.
# Reason: the first CI run (run 26014805188) showed `npm test` is already red
# on `main` — largely because several tests make un-mocked LIVE network calls
# (`fetch failed` / `unable to verify the first certificate` /
# `Dataset 8kc5-95uk does not support resource API access` /
# `USGS site service unreachable`). That contradicts AGENTS.md §5 (never live
# external calls — always a cached snapshot). A hard gate today would wall off
# every PR for an environmental reason, which is worse than no gate.
#
# PROMOTION PATH (tracked follow-up — see PR #47 description):
#   1. De-network the suite: mock/fixture every external fetcher so tests are
#      hermetic (AGENTS.md §5). Land that first.
#   2. Then flip `Unit tests` and `Production build` to hard gates by deleting
#      their `continue-on-error: true` lines and the `if: always()` on build.
# Until step 1 lands, this CI is a dashboard, not a gate.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# One in-flight run per ref; new pushes cancel stale runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # prisma.config.ts defaults to file:./prisma/dev.db when unset; point CI
      # at a throwaway sqlite file so `prisma generate` / `next build` never
      # touch a real database.
      DATABASE_URL: file:./prisma/ci.db
      CI: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # `npm ci` runs the `postinstall` → `prisma generate` hook.
      - name: Install dependencies
        run: npm ci

      - name: Lint (advisory)
        run: npm run lint
        continue-on-error: true

      # Advisory until the suite is de-networked (see header). Red today for
      # environmental reasons, not code regressions.
      - name: Unit tests (advisory)
        run: npm test
        continue-on-error: true

      # `if: always()` so we still learn build status even though the test step
      # is expected to fail today. Advisory until the suite is a real gate.
      - name: Production build (advisory)
        if: always()
        run: npm run build
        continue-on-error: true
